<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIMID Creative Placeholder</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
      }

      .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: #1e293b;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .title {
        margin-top: 16px;
        font-size: 20px;
        font-weight: 600;
      }

      .subtitle {
        margin-top: 8px;
        font-size: 14px;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="badge">SIMID 1.1</span>
      <div class="title">SIMID Creative Placeholder</div>
      <div class="subtitle">Swap this with the real creative later.</div>
    </div>
    <script src="/assets/api-frameworks/simid-creative.js"></script>
  </body>
</html>
