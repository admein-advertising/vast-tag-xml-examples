<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIMID Creative Placeholder</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: "Helvetica Neue", Arial, sans-serif;
        color: #e2e8f0;
      }

      .container {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        height: 100%;
        text-align: left;
        padding: clamp(10px, 5vw, 0px);
        box-sizing: border-box;
        width: 100%;
        gap: clamp(16px, 5vw, 48px);
      }

      .inner {
        max-width: 100%;
        flex: 1 1 auto;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 0.625rem;
        align-items: center;
        justify-content: flex-start;
        flex: 0 0 auto;
      }

      .control-button {
        border: 0;
        width: 2rem;
        height: 2rem;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        color: #ffffff;
        background: transparent;
        cursor: pointer;
      }

      .control-button--text {
        width: auto;
        height: auto;
        padding: 0.25rem 0.5rem;
        font-size: 0.65rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: #fde047;
        color: #1e293b;
        border-radius: 50rem;
        padding: 0.5rem 0.75rem;
      }

      .control-button--text:hover, .control-button:hover {
        filter: drop-shadow(0px 1px 1px rgba(0, 0, 0, 0.45));
        transform: translateY(1px);
      }

      .control-button--text:active, .control-button:active {
        transform: translateY(1px);
      }

      .control-button svg {
        width: 2rem;
        height: 2rem;
        display: block;
        fill: currentColor;
      }

      .filler-shadow {
        filter: drop-shadow(1px 1px 0px rgba(0, 0, 0, 0.45));
      }

      .control-button .icon-pause {
        display: none;
      }

      .control-button.is-playing .icon-play {
        display: none;
      }

      .control-button.is-playing .icon-pause {
        display: block;
      }

      .control-button:active {
        transform: translateY(1px);
      }

      .status {
        margin-top: 0.625rem;
        font-size: 1rem;
        font-weight: 500;
        color: #ffffff;
      }

      .badge {
        display: inline-block;
        padding: 0.375rem 0.75rem;
        border-radius: 50rem;
        background: #fde047;
        color: #1e293b;
        font-size: clamp(8px, 2.5vw, 12px);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .title {
        margin-top: 0.5rem;
        font-size: clamp(13px, 5vw, 28px);
        font-weight: 600;
        color: #ffffff;
      }

      .subtitle {
        margin-top: 0.5rem;
        font-size: clamp(13px, 3.5vw, 16px);
        color: #ffffff;
      }

      .dialog-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(2px);
        z-index: 10;
      }

      .dialog-overlay.is-open {
        display: flex;
      }

      .dialog {
        width: min(80vw, 22rem);
        background: #0b1220;
        border-radius: 0.75rem;
        padding: 1rem;
        color: #ffffff;
      }

      .dialog-title {
        margin: 0;
        font-size: 1rem;
      }

      .dialog-body {
        margin-top: 0.5rem;
        font-size: 0.875rem;
        color: #e2e8f0;
      }

      .dialog-actions {
        margin-top: 1rem;
        display: flex;
        justify-content: flex-end;
      }

      .dialog-close {
        border: 0;
        padding: 0.4rem 0.75rem;
        border-radius: 0.5rem;
        background: #fde047;
        color: #1e293b;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="inner">
        <span class="badge">SIMID 1.1</span>
        <div class="title filler-shadow">SIMID Creative</div>
        <div class="status filler-shadow" data-status>Click pause to toggle the play state</div>
      </div>
      <div class="controls" data-controls>
        <button class="control-button control-button--text" data-action="learn-more">Learn More</button>
        <button class="control-button" data-action="toggle-play" aria-label="Play" data-state="paused">
          <svg class="icon-play filler-shadow" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg class="icon-pause filler-shadow" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 5h4v14H6zm8 0h4v14h-4z" />
          </svg>
        </button>
      </div>
    </div>
    <div class="dialog-overlay" data-dialog>
      <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
        <h2 class="dialog-title" id="dialog-title">Learn More</h2>
        <div class="dialog-body">
          <p>This is an example SIMID creative built using the SIMID 1.1 protocol. It includes a play/pause toggle button and a "Learn More" button that opens this dialog.</p>
        </div>
        <div class="dialog-actions">
          <button class="dialog-close" data-dialog-close>Close</button>
        </div>
      </div>
    </div>
    <script src="./assets/simid-protocol.js"></script>
    <script src="./assets/base-simid-creative.js"></script>
    <script src="./assets/simid-controls.js"></script>
    <script src="./assets/simid-dialog.js"></script>
    <script src="./assets/simid-creative.js"></script>
  </body>
</html>
